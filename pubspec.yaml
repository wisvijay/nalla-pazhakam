name: nalla_pazhakam
description: "Good Habits - Kids Habit Tracker"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # Local Storage (IndexedDB on web, file system on Android/iOS)
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.4   # Required by Hive on Android/iOS

  # Fonts & UI
  google_fonts: ^6.2.1

  # Image Picker (web + mobile)
  image_picker: ^1.1.2

  # Animations
  confetti: ^0.7.0
  lottie: ^3.1.0

  # Charts
  fl_chart: ^0.69.0

  # Calendar
  table_calendar: ^3.1.2

  # Date/Number Formatting
  intl: ^0.19.0

  # Shared Preferences (fallback / feature flags)
  shared_preferences: ^2.3.2

  # Icons
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  hive_generator: ^2.0.1
  json_serializable: ^6.0.0  # if using JSON serialization
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  mocktail: ^1.0.4    # Mocking for unit tests (no code-gen needed)

flutter:
  uses-material-design: true

  assets:
    - assets/images/habits/
    - assets/animations/
    - assets/android_icons/
  # Fonts are loaded via the google_fonts package at runtime (no local files needed)
