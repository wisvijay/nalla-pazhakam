name: 🚀 Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Job 1: Build Flutter Web PWA ────────────────────────────────
  build-web:
    name: 🌐 Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.1"
          channel: "stable"
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: ⚙️ Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🧪 Run tests
        run: flutter test
        continue-on-error: true

      - name: 🌐 Build for Web (PWA)
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --base-href "/${{ github.event.repository.name }}/"

      - name: 📤 Upload web artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # ── Job 2: Build Android APK ────────────────────────────────────
  build-apk:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.1"
          channel: "stable"
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: ⚙️ Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔨 Build APK (release)
        run: flutter build apk --release

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nalla-pazhakam-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Job 3: Deploy to GitHub Pages (main branch only) ────────────
  deploy:
    name: 🌍 Deploy to GitHub Pages
    needs: build-web
    if: github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Deployment Summary
        run: |
          echo "## 🌟 Nalla Pazhakam Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PWA URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** Download from the build-apk job artifacts" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
